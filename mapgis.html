<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>百度地图瓦片加载</title>
  <style>
      html, body, #mapContainer {
          width: 100%;
          height: 100%;
          margin: 0;
          padding: 0;
          overflow: hidden;
      }
  </style>
</head>

<body>
<div id="mapContainer"></div>

<script type="text/javascript" src="https://api.map.baidu.com/api?v=1.0&type=webgl&ak=LJE9DBPofw0ZoCkSyVXhWzLSKdzWUdau&callback=initBaiduMap&language=zh-cn"></script>

<script>
let map = null;
let tileLayer = null;

function initBaiduMap() {
    map = new BMapGL.Map('mapContainer');
    map.centerAndZoom(new BMapGL.Point(116.404, 39.915), 12);
    
    tileLayer = new BMapGL.TileLayer({
        transparentPng: true
    });
    
    tileLayer.getTilesUrl = function (tileCoord, zoom) {
        const x = tileCoord.x;
        const y = tileCoord.y;
        const z = zoom;
        return `https://42.64.192.212:8089/igs/rest/services/wuhan/TileServer/tileImage/${z}/${x}/${y}/${z}?f=image`;
    };
    
    map.addTileLayer(tileLayer);
}

</script>
</body>
</html>
