<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Cesium 加载自定义影像</title>

  <!-- Cesium CDN -->
  <script src="https://unpkg.com/cesium@1.136/Build/Cesium/Cesium.js"></script>
  <link href="https://unpkg.com/cesium@1.136/Build/Cesium/Widgets/widgets.css" rel="stylesheet">

  <style>
      html, body, #cesiumContainer {
          width: 100%;
          height: 100%;
          margin: 0;
          padding: 0;
          overflow: hidden;
      }
  </style>
</head>

<body>
<div id="cesiumContainer"></div>

<script>
	const viewer = new Cesium.Viewer('cesiumContainer', {
		animation: false,
		timeline: false,
		baseLayerPicker: false,
		imageryProvider: false,
	});

	const imageryProvider = new Cesium.UrlTemplateImageryProvider({
		url: 'http://42.64.192.212:8089/igs/rest/services/wuhan/TileServer/tileImage/{z}/{x}/{y}?t=image',
		tilingScheme: new Cesium.WebMercatorTilingScheme(),

		maximumLevel: 18,
		minimumLevel: 0,
		proxy: new Cesium.DefaultProxy('/proxy/')
	});

	viewer.imageryLayers.addImageryProvider(imageryProvider);

	viewer.camera.setView({
		destination: Cesium.Cartesian3.fromDegrees(114.305539, 30.592850, 100000)
	});

</script>
</body>
</html>
